<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SnapBooth 📸</title>
  <meta name="theme-color" content="#0d0d0d" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.3/qrcode.min.js"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body>
  <div class="grain" aria-hidden="true"></div>

  <header class="header">
    <div class="logo">Snap<span>Booth</span> 📸</div>
    <div class="header-right"><span class="badge">FREE</span></div>
  </header>

  <main class="app">
    <section class="camera-panel">
      <div class="viewfinder" id="viewfinder">
        <video id="video" autoplay playsinline></video>
        <div id="sticker-overlay" class="sticker-overlay" aria-hidden="true"></div>
        <div class="vf-corner tl"></div><div class="vf-corner tr"></div>
        <div class="vf-corner bl"></div><div class="vf-corner br"></div>
        <div id="shot-dots"    class="shot-dots"></div>
        <div id="filter-label" class="filter-label">NORMAL</div>
        <div id="zoom-label"   class="zoom-label">1×</div>
        <div id="countdown"    class="countdown">3</div>
        <div id="blitz"        class="blitz"></div>
        <div id="no-cam" class="no-cam show">
          <div class="no-cam-icon">📷</div>
          <p>Izinkan akses kamera untuk memulai</p>
          <button class="btn-start-cam" onclick="startCamera()">Aktifkan Kamera</button>
        </div>
      </div>

      <div class="controls">
        <div class="ctrl-group">
          <div class="ctrl-label">Jumlah Foto</div>
          <div class="pill-row" id="shot-row">
            <button class="pill active" data-shots="1">1 Foto</button>
            <button class="pill"        data-shots="2">2 Foto</button>
            <button class="pill"        data-shots="3">3 Foto</button>
            <button class="pill"        data-shots="4">4 Foto</button>
          </div>
        </div>

        <div class="ctrl-group">
          <div class="ctrl-label">Layout Strip</div>
          <div class="pill-row" id="layout-row">
            <button class="pill active" data-layout="vertical">☰ Vertikal</button>
            <button class="pill" data-layout="grid" disabled title="Grid 2×2 hanya untuk 4 foto">⊞ Grid 2×2</button>
          </div>
        </div>

        <div class="ctrl-group">
          <div class="ctrl-label">Kamera</div>
          <div class="pill-row">
            <button class="pill active" data-cam="user"        data-zoom="1"   onclick="switchCamera(this)">🤳 Depan</button>
            <button class="pill"        data-cam="environment" data-zoom="1"   onclick="switchCamera(this)">📷 Belakang</button>
            <button class="pill"        data-cam="environment" data-zoom="0.5" onclick="switchCamera(this)">🔭 0.5×</button>
          </div>
        </div>

        <div class="ctrl-group">
          <div class="ctrl-label">Filter</div>
          <div class="pill-row" id="filter-row">
            <button class="pill active" data-filter="" data-label="Normal">✦ Normal</button>
            <button class="pill" data-filter="grayscale(100%)" data-label="B&W">◑ B&W</button>
            <button class="pill" data-filter="saturate(200%) contrast(110%)" data-label="Vivid">⚡ Vivid</button>
            <button class="pill" data-filter="sepia(30%) saturate(150%) brightness(105%)" data-label="Warm">🔥 Warm</button>
          </div>
        </div>

        <div class="ctrl-group">
          <div class="ctrl-label">Stiker Emoji <span class="ctrl-hint">(maks. 4)</span></div>
          <div class="sticker-grid" id="sticker-row">
            <button class="stk-btn" data-s="⭐" data-tx="10" data-ty="12">⭐</button>
            <button class="stk-btn" data-s="🌸" data-tx="80" data-ty="12">🌸</button>
            <button class="stk-btn" data-s="🎉" data-tx="10" data-ty="75">🎉</button>
            <button class="stk-btn" data-s="🔥" data-tx="88" data-ty="45">🔥</button>
            <button class="stk-btn" data-s="✌️" data-tx="55" data-ty="25">✌️</button>
          </div>
        </div>

        <div class="btn-row">
          <button id="btn-capture" class="btn-capture" onclick="startSession()">📸 AMBIL FOTO</button>
          <button id="btn-reset"   class="btn-reset"   onclick="resetAll()" title="Reset">↺</button>
        </div>

        <div id="status" class="status-bar" role="status" aria-live="polite">
          Tekan <strong>Aktifkan Kamera</strong> untuk memulai
        </div>
      </div>
    </section>

    <aside class="strip-panel">
      <h2 class="strip-panel-title">🎞 Photo Strip</h2>
      <div class="strip-card">
        <div class="strip-preview-wrapper" id="strip-preview-wrapper">
          <div class="photo-strip" id="photo-strip"></div>
          <div class="strip-foot" id="strip-foot">
            <div class="strip-foot-brand">✦ SNAPBOOTH ✦</div>
            <div class="strip-foot-date" id="strip-date"></div>
          </div>
        </div>

        <div class="ctrl-group" style="align-items:center; margin-top: 20px;">
          <div class="ctrl-label" style="text-align:center">Warna Frame</div>
          <div class="swatches" id="swatches">
            <div class="swatch active" data-c="#ffffff" style="background:#fff"></div>
            <div class="swatch dark"   data-c="#1a1a1a" style="background:#1a1a1a"></div>
            <div class="swatch"        data-c="#f5e642" style="background:#f5e642"></div>
            <div class="swatch"        data-c="#ff6b6b" style="background:#ff6b6b"></div>
            <div class="swatch"        data-c="#c8b4f5" style="background:#c8b4f5"></div>
          </div>
        </div>
      </div>

      <button id="btn-dl" class="btn-dl" onclick="downloadStrip()">⬇ DOWNLOAD STRIP</button>

      <div id="qr-section" class="qr-section" style="display:none">
        <div class="qr-title">📲 Scan untuk ambil foto</div>
        <canvas id="qr-canvas" class="qr-canvas"></canvas>
        <a id="qr-link" href="#" target="_blank" class="qr-link">Buka link foto →</a>
        <div class="qr-note">✅ Foto telah dikirim ke email admin untuk dicetak!</div>
      </div>
    </aside>
  </main>

  <canvas id="work-canvas" style="display:none;"></canvas>
  <script src="app.js"></script>
</body>
</html>
